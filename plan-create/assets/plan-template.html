<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PLAN_TITLE}}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
<style>
  html { font-size: 87.5%; }
  :root { --pico-line-height: 1.4; }

  /* Checkbox done-state */
  article:has(.step-check:checked) { opacity: 0.45; }
  article:has(.step-check:checked) strong { text-decoration: line-through; }
  li:has(.verify-check:checked) { opacity: 0.45; }
  li:has(.verify-check:checked) strong { text-decoration: line-through; }

  /* Anchor links */
  .anchor { font-size: 0.7em; opacity: 0; text-decoration: none; margin-left: 0.4em; transition: opacity 0.15s; }
  h2:hover .anchor, h3:hover .anchor { opacity: 1; }

  /* Badges */
  [data-badge] { font-size: 0.65em; font-weight: 700; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; display: inline-block; vertical-align: middle; }
  [data-badge="risk"]   { background: #fee; color: #c00; }
  [data-badge="warn"]   { background: #fef6e8; color: #a60; }
  [data-badge="safe"]   { background: #eef9ee; color: #080; }
  [data-badge="info"]   { background: #eef5ff; color: #06c; }
</style>
</head>
<body>
<main>

  <header>
    <small><!-- e.g. Implementation Plan / Refactor Proposal --></small>
    <h1><!-- Plan title --></h1>
    <p><small>📅 <!-- date --> &nbsp;&nbsp; 🔬 <!-- scope --></small></p>
  </header>

  <aside>
    <h4>Context</h4>
    <p><!-- Why this plan exists. The problem or need it addresses. --></p>
    <p><!-- Key drivers / what prompted this work. --></p>
  </aside>

  <!-- ── PHASE — each gets an id for anchoring ── -->
  <section id="phase-1">
    <h2><!-- Phase title --> <a class="anchor" href="#phase-1">#phase-1</a></h2>

    <!-- STEP CARD — check the checkbox to mark done (session-only, no persistence) -->
    <article id="phase-1-step-1">
      <header>
        <label>
          <input type="checkbox" class="step-check">
          <span data-badge="info">info</span> <!-- risk / warn / safe / info -->
          <strong><!-- Step title --></strong>
        </label>
        <small><!-- One-liner description --></small>
      </header>
      <p>What to do. Reference file paths and line numbers.</p>
      <p><code>path/to/file.go:42–88</code> &nbsp; <kbd>backend</kbd></p>
    </article>
    <!-- END STEP CARD -->

  </section>
  <!-- END PHASE — repeat per phase -->

  <!-- VERIFICATION CHECKLIST -->
  <section id="verification">
    <h2>Verification Checklist <a class="anchor" href="#verification">#verification</a></h2>
    <ul>
      <li><label><input type="checkbox" class="verify-check"> <strong>Item:</strong></label> How to verify.</li>
      <li><label><input type="checkbox" class="verify-check"> <strong>Build:</strong></label> <code>go build .</code> passes.</li>
    </ul>
  </section>

  <!-- EXECUTION ORDER -->
  <section id="execution-order">
    <h2>Execution Order <a class="anchor" href="#execution-order">#execution-order</a></h2>
    <ol>
      <li><!-- Step description --></li>
      <li><!-- Step description --></li>
    </ol>
  </section>

</main>

<!-- Syntax highlighting via highlight.js (CDN) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script>if (typeof hljs !== 'undefined') hljs.highlightAll();</script>

</body>
</html>
